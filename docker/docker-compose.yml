version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: kozmetik-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: kozmetik
      POSTGRES_PASSWORD: kozmetik_dev
      POSTGRES_DB: kozmetik_platform
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U kozmetik -d kozmetik_platform']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: kozmetik-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redisdata:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  redisdata:
