name: Onboarding Schema Drift Gate

# V2.A.1 — per-PR drift check: when someone changes an entity column or the
# onboarding validator payload, verify the two stay in sync. Fails with exit 2
# if new columns exist that the payload doesn't cover (and aren't in the SKIP
# list). Zero external deps — runs purely off the repo, no DB access.
on:
  pull_request:
    branches: [master, main]
    paths:
      - 'apps/api/src/database/entities/ingredient.entity.ts'
      - 'apps/api/src/database/entities/product.entity.ts'
      - 'apps/api/src/scripts/onboarding/validators.ts'
      - 'apps/api/src/scripts/audit/schema-drift-check.ts'

jobs:
  drift:
    name: Schema drift audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Get pnpm store directory
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Cache pnpm
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run schema drift check (fail on drift)
        run: pnpm --filter api exec ts-node "src/scripts/audit/schema-drift-check.ts" --fail-on-drift
