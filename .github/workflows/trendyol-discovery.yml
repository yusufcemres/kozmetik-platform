name: Trendyol Discovery Scan

on:
  schedule:
    # Mondays 07:00 UTC = 10:00 TR. Weekly is deliberate — Tavily quota is
    # shared with other jobs and TY catalogue churn is low day-to-day.
    - cron: '0 7 * * 1'
  workflow_dispatch:
    inputs:
      write_drafts:
        description: 'Write skeleton JSONs under products-queue/_drafts/'
        required: false
        default: 'true'
      notify:
        description: 'Post a Telegram summary'
        required: false
        default: 'true'

jobs:
  scan:
    name: Scan Trendyol for new SKUs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Get pnpm store directory
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Cache pnpm
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run scan-trendyol
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        shell: bash
        run: |
          args=()
          if [ "${{ github.event.inputs.write_drafts || 'true' }}" = "true" ]; then args+=(--write-drafts); fi
          if [ "${{ github.event.inputs.notify || 'true' }}" = "true" ]; then args+=(--notify); fi
          pnpm --filter api exec ts-node "src/scripts/discovery/scan-trendyol.ts" "${args[@]}"

      - name: Open PR with drafts (if any)
        if: github.event.inputs.write_drafts != 'false'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          if ! git diff --quiet --exit-code -- apps/api/src/database/seeds/products-queue/_drafts/ 2>/dev/null; then
            has_changes=1
          elif [ -n "$(git status --porcelain apps/api/src/database/seeds/products-queue/_drafts/ 2>/dev/null)" ]; then
            has_changes=1
          else
            has_changes=0
          fi

          if [ "$has_changes" -eq 0 ]; then
            echo "No draft changes — nothing to PR."
            exit 0
          fi

          stamp=$(date -u +%Y%m%d)
          branch="chore/trendyol-drafts-${stamp}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$branch"
          git add apps/api/src/database/seeds/products-queue/_drafts/
          git commit -m "chore(discovery): Trendyol scan drafts ${stamp}"
          git push -u origin "$branch"
          gh pr create \
            --title "chore(discovery): Trendyol drafts ${stamp}" \
            --body "Auto-generated by trendyol-discovery workflow. Draft JSONs under products-queue/_drafts/ — review, fill, and move to products-queue/ root to onboard." \
            --label "discovery,draft" || true
