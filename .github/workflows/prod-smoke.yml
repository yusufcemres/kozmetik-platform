name: Production Smoke

on:
  push:
    branches: [master, main]
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  smoke:
    name: Playwright vs Production
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm --filter web exec playwright install --with-deps chromium

      - name: Wait for Vercel deploy settle
        if: github.event_name == 'push'
        run: sleep 180

      - name: Run Playwright smoke against production
        run: pnpm --filter web exec playwright test
        env:
          PLAYWRIGHT_BASE_URL: https://kozmetik-platform.vercel.app
          CI: 'true'

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 7
