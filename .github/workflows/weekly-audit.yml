name: Weekly Catalog Audit

on:
  schedule:
    # Sundays 06:00 UTC = 09:00 TR — before we start the week
    - cron: '0 6 * * 0'
  workflow_dispatch:
    inputs:
      since_days:
        description: 'Regression window in days'
        required: false
        default: '7'

jobs:
  audit:
    name: Weekly supplement catalog audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Get pnpm store directory
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Cache pnpm
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run weekly audit report
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          pnpm --filter api exec ts-node "src/scripts/audit/weekly-report.ts" \
            --notify \
            --since-days=${{ github.event.inputs.since_days || '7' }}

      - name: Schema drift audit (entity ↔ validator payload)
        # Non-blocking — logs drift so a dev can address it in the next PR.
        # CI gate in onboarding-drift.yml handles per-PR blocking.
        continue-on-error: true
        run: pnpm --filter api exec ts-node "src/scripts/audit/schema-drift-check.ts"

      - name: Score regression detector (compare last two score rows)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          pnpm --filter api exec ts-node "src/scripts/audit/score-regression-check.ts" \
            --notify-telegram
